<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pet Spa — Nueva contraseña</title>
<link rel="stylesheet" href="css/style.css">
<style>
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--cream); }
  .reset-box {
    background: var(--white);
    border-radius: var(--radius-xl);
    padding: 40px;
    max-width: 420px;
    width: 100%;
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--sand);
  }
  .reset-logo { font-family: var(--font-display); font-size: 1.4rem; margin-bottom: 6px; }
  .reset-logo span { color: var(--sage); }
  .req-list { font-size:.78rem; color:var(--gray); margin-top:6px; padding-left:16px; }
  .req-list li { margin-bottom:2px; }
  .req-list li.ok { color:var(--sage-dark); }
  .req-list li.fail { color:var(--terracotta); }
</style>
</head>
<body>
<div id="toast-container"></div>
<div class="reset-box">
  <div class="reset-logo">Pet<span>Spa</span> 🐾</div>
  <p style="color:var(--gray);font-size:.875rem;margin-bottom:24px">Establece una nueva contraseña segura</p>
  <div id="msg-reset"></div>

  <div id="form-reset">
    <div class="form-group">
      <label class="form-label">Nueva contraseña</label>
      <input class="form-control" type="password" id="new-pass" placeholder="Ej: MiPerro@2024">
      <div id="strength-wrap" class="password-strength mt-8"><div class="password-strength-bar"></div></div>
      <ul class="req-list" id="req-list">
        <li id="req-len">Mínimo 8 caracteres</li>
        <li id="req-upper">Al menos una mayúscula (A-Z)</li>
        <li id="req-lower">Al menos una minúscula (a-z)</li>
        <li id="req-num">Al menos un número (0-9)</li>
        <li id="req-sym">Al menos un símbolo (* # ! @ $ % ^ &amp;)</li>
      </ul>
    </div>
    <div class="form-group">
      <label class="form-label">Confirmar contraseña</label>
      <input class="form-control" type="password" id="confirm-pass" placeholder="Repite la contraseña">
    </div>
    <button class="btn btn-primary w-full btn-lg" id="btn-reset" onclick="doReset()">
      Actualizar contraseña
    </button>
  </div>
</div>

<script src="js/app.js"></script>
<script>
const token = new URLSearchParams(window.location.search).get('token');
if (!token) {
  document.getElementById('msg-reset').innerHTML = '<div class="alert alert-error">Token inválido.</div>';
  document.getElementById('form-reset').style.display = 'none';
}

document.getElementById('new-pass').addEventListener('input', function() {
  const val = this.value;
  const checks = {
    'req-len':   val.length >= 8,
    'req-upper': /[A-Z]/.test(val),
    'req-lower': /[a-z]/.test(val),
    'req-num':   /[0-9]/.test(val),
    'req-sym':   /[*#!@$%^&]/.test(val),
  };
  let score = 0;
  Object.entries(checks).forEach(([id, ok]) => {
    const el = document.getElementById(id);
    el.classList.toggle('ok',   ok);
    el.classList.toggle('fail', !ok && val.length > 0);
    if (ok) score++;
  });
  const level = score <= 2 ? 'débil' : score <= 4 ? 'media' : 'fuerte';
  document.getElementById('strength-wrap').className = 'password-strength strength-' + level;
});

async function doReset() {
  const pass    = document.getElementById('new-pass').value;
  const confirm = document.getElementById('confirm-pass').value;
  const btn     = document.getElementById('btn-reset');
  const msgEl   = document.getElementById('msg-reset');

  if (!pass) { msgEl.innerHTML = '<div class="alert alert-error">Ingresa la nueva contraseña</div>'; return; }
  if (pass !== confirm) { msgEl.innerHTML = '<div class="alert alert-error">Las contraseñas no coinciden</div>'; return; }

  // Validar requisitos antes de enviar
  const reqs = [
    [pass.length >= 8,       'Mínimo 8 caracteres'],
    [/[A-Z]/.test(pass),     'Al menos una mayúscula'],
    [/[a-z]/.test(pass),     'Al menos una minúscula'],
    [/[0-9]/.test(pass),     'Al menos un número'],
    [/[*#!@$%^&]/.test(pass),'Al menos un símbolo (* # ! @ $ % ^ &)'],
  ];
  const errores = reqs.filter(([ok]) => !ok).map(([,msg]) => msg);
  if (errores.length) {
    msgEl.innerHTML = '<div class="alert alert-error"><strong>La contraseña no cumple:</strong><ul style="margin:6px 0 0 16px">' +
      errores.map(e => '<li>' + e + '</li>').join('') + '</ul></div>';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div>';

  try {
    const res = await fetch('/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password: pass })
    }).then(r => r.json());

    btn.disabled = false;
    btn.innerHTML = 'Actualizar contraseña';

    if (res?.success) {
      document.getElementById('form-reset').innerHTML = `
        <div class="alert alert-success mb-16">✅ Contraseña actualizada correctamente.</div>
        <a href="/login.html" class="btn btn-primary w-full btn-lg">Ir al login →</a>`;
    } else {
      const errList = res?.errors
        ? '<ul style="margin:6px 0 0 16px">' + res.errors.map(e => '<li>' + e + '</li>').join('') + '</ul>'
        : '';
      msgEl.innerHTML = '<div class="alert alert-error">' + (res?.message || 'Error') + errList + '</div>';
    }
  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = 'Actualizar contraseña';
    msgEl.innerHTML = '<div class="alert alert-error">Error de conexión</div>';
  }
}
</script>
</body>
</html>
