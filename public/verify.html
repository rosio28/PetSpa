<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pet Spa — Verificar Email</title>
<link rel="stylesheet" href="css/style.css">
<style>
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .verify-box {
    background: var(--white);
    border-radius: var(--radius-xl);
    padding: 48px;
    max-width: 420px;
    width: 100%;
    text-align: center;
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--sand);
  }
  .verify-icon { font-size: 3.5rem; margin-bottom: 16px; }
  .verify-title { font-family: var(--font-display); font-size: 1.6rem; margin-bottom: 8px; }
  .verify-desc { color: var(--gray); font-size: .9rem; margin-bottom: 24px; }
</style>
</head>
<body>
<div id="toast-container"></div>
<div class="verify-box">
  <div class="verify-icon" id="verify-icon">⏳</div>
  <div class="verify-title" id="verify-title">Verificando...</div>
  <div class="verify-desc" id="verify-desc">Estamos activando tu cuenta.</div>
  <div id="verify-actions"></div>
</div>

<script src="js/app.js"></script>
<script>
(async () => {
  const params = new URLSearchParams(window.location.search);
  const token  = params.get('token');

  if (!token) {
    document.getElementById('verify-icon').textContent  = '❌';
    document.getElementById('verify-title').textContent = 'Token inválido';
    document.getElementById('verify-desc').textContent  = 'No se encontró token de verificación.';
    document.getElementById('verify-actions').innerHTML = `<a href="login.html" class="btn btn-primary">Ir al login</a>`;
    return;
  }

  const res = await fetch(`${API}/auth/verify?token=${token}`).then(r=>r.json()).catch(()=>null);

  if (res?.success) {
    document.getElementById('verify-icon').textContent  = '✅';
    document.getElementById('verify-title').textContent = '¡Cuenta activada!';
    document.getElementById('verify-desc').textContent  = 'Tu cuenta está lista. Ya puedes iniciar sesión.';
    document.getElementById('verify-actions').innerHTML = `<a href="login.html" class="btn btn-primary btn-lg">Iniciar sesión →</a>`;
  } else {
    document.getElementById('verify-icon').textContent  = '⏰';
    document.getElementById('verify-title').textContent = 'Link expirado';
    document.getElementById('verify-desc').textContent  = 'El link de activación expiró (válido 15 minutos). Solicita uno nuevo.';
    document.getElementById('verify-actions').innerHTML = `
      <input class="form-control mb-16" type="email" id="re-email" placeholder="Tu correo electrónico">
      <button class="btn btn-primary w-full" onclick="reenviar()">Reenviar link de activación</button>
      <a href="login.html" class="btn btn-secondary w-full mt-8">Volver al login</a>
    `;
  }
})();

async function reenviar() {
  const email = document.getElementById('re-email').value.trim();
  if (!email) return;
  await fetch(`${API}/auth/resend-verification`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email })
  });
  Toast.success('Si el correo existe, recibirás un nuevo link en breve.');
}
</script>
</body>
</html>
